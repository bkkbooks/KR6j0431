body:
  text: 大興善寺翻經院述金剛手言一切衆生意想不同或順或逆是故如來現慈怒身隨作利益解云諸佛大悲愍衆生故即於順者以順而勸若於逆者以逆而制也一佛住忿怒三昧時十方諸佛同共入忿怒瞋三昧豈毗盧遮那於無相中示現明王時諸佛菩薩更不現忿怒身哉是故四方如來現教令身降伏衆魔雖然猶不親隨逐所以本誓不同或降三世菩薩降伏天魔及三世貪瞋癡或軍荼利菩薩調伏常隨魔謂毗那夜迦及人魔或焰魔特迦降伏龍魔及諸怨敵或金剛夜叉調伏鬼魔及無智者如是種種不可具說不動明王恆隨行者若天若毗那夜迦若龍若鬼所作障礙一時消滅然諸佛菩薩若同住一三昧者可有隨不動弘誓之使者爰有三藏不空能達明道即披見祕藏要文有不動明王一字心密語即以八字而嚴一字其八字者即歸命句也唅字為本尊若爾寧上八字無其形哉所以者何那莫等八字一一皆歸敬於唅之一字是故從其八字出生歸敬使者圍繞於唅之本尊所以有八大童子一慧光菩薩金剛云回光即以慧如光照回一切故二慧喜菩薩金剛云慧喜即回慧為喜三阿耨達菩薩四指德菩薩五烏俱婆誐六清淨比丘七矜羯羅八制吒迦是等使者四智四波羅蜜為親隨順大日教令故顯現此形圍繞聖無動尊也各別真言中顯示其義解云東方金剛部即菩提心門以日光為喻所以出生使者名慧光南方寶部即福德門所以出生使者名慧喜以福智二嚴為喜故西方蓮華部即智慧門所以出現使者名阿耨達此云無熱表蓮華生池水而清淨無垢故北方羯磨部即精進門所以出生使者名指德也今此部指前三部德即依精進能得果故所以名指德已上四智金剛波羅蜜即菩提心行所以出現使者名烏俱婆誐此云超越住世也寶波羅蜜福德心行所以出生使者名清淨比丘表比丘能守護法寶故法波羅蜜慈悲心行所以出現使者名矜羯羅此云隨順業波羅蜜即方便心行所以出生使者名制多迦此云息災也菩薩方便現瞋形故也八童子所依說已竟若行者欲得現當悉地者行法之中稱彼各名請乞救護及結印誦呪即成一切世間殊勝悉地慧光童子菩薩真言曰即金剛合掌忍願合如針唵嚩日囉二合一摩帝入縛二合攞二菩地質多三曩歸命本尊慧喜菩薩真言曰金合忍願如寶形唵囉􅑈怛曩二合一摩帝娑度二摩訶摩抳三莫歸命本尊阿耨達菩薩真言曰金合忍願如蓮葉唵鉢納麼二合一薩􅞣嚩娜引賀鉢囉二合捨弭曩二摩訶達摩三三歸命本尊指德童子菩薩真言曰金合忍願入掌中面相合唵羯羅摩二合摩訶吠􅝩哩耶大無畏也鉢哩布囉迦滿願滿歸命本尊烏俱婆誐童子真言曰金剛合掌唵嚩日囉二合一薩埵婆二烏俱婆誐三摩訶燥企耶二合四多歸命本尊清淨比丘使者真言曰梵夾印唵摩尼一尾輸馱達摩俱嚕二囉乞叉達摩三嚩歸命本尊矜羯囉童子真言曰蓮華合掌唵達嚕麼一矜羯囉二底瑟吒三日囉二合歸命本尊制多迦童子真言曰外縛五股印唵羯嚕麼一制吒迦二吽吽三發吒四南歸命本尊次本尊真言曰通用經中印唵一阿左囉二贊拏三唅所歸本尊次說像法行者點取一清淨靜處勿令見人及與非人即行者與工人共清淨著新淨衣取白㲲或淨版或淨衣令畫本尊與八大童子本尊通用經中像慧光之形少忿怒著天冠身白黃色右手持五智杵左手蓮上置月輪袈裟瓔珞種種莊嚴次慧喜菩薩形似慈面現微笑相色如紅蓮左手持摩尼右手持三股鉤阿耨達菩薩形如梵王色如真金頂戴金翅鳥左手執蓮華右手持獨股杵而乘龍王指德菩薩形如夜叉色如虛空而有三目著甲胄左手持輪右手三叉鉾烏俱婆誐戴五股冠現暴惡相身如金色右手執縛日囉左手作拳印清淨比丘剃除首髮而著法袈裟於左肩結垂左手執梵夾右手當心持五股杵右肩現露於腰纏赤裳其面貌非若非老目如青蓮其口上牙於下顯出次矜羯囉形如十五歲童著蓮華冠身白肉色二手合掌其二大指與頭指間橫插一股杵天衣袈裟微妙嚴飾次制吒迦亦如童子色如紅蓮頭結五髻一結頂上之中一結額上二結頭左右一結頂後表五方五智左手嚩日囉右手執金剛棒瞋心惡性之者故不著袈裟以天衣纏其頸肩畫像法說已竟次說供養法行者欲陳供養者先須發菩提心云何菩提心謂發救衆生之心思惟衆生苦惱起拔濟心也如是發心時不動明王及八大童子為不請師從自心出護持行者應當供養住於山林寂靜之處燒香散花持念真言如是行時使者現身隨意奉仕先須禮四方如來發大誓願即禮東方作是念言衆生無邊誓願度是大圓鏡智願也即菩提心門菩提心即度衆生心故發此願作禮者乃至成佛常得金剛薩埵加持令菩提心圓滿次禮南方作是念言福智無邊誓願集是平等性智之因也即福智門以福智二種資糧利益衆生故若發此願作此禮者乃至成佛地地中常得虛空藏菩薩授與灌頂福智圓滿次禮西方作是念言法門無邊誓願學是願妙觀察智之因也即智慧門為大法王故作是願禮者乃至成佛當得觀自在菩薩加持智慧圓滿次禮北方而作是念言如來無邊誓願仕是成所作智之因也即作業門於諸佛前作諸事業故若作是願禮者乃至成佛當得金剛業菩薩加持於一切佛世界成就廣大供養業次禮毗盧遮那如來而作是言無上菩提誓願證是法界體性智之因也證大日普賢位周遍法界更利衆生故發此願時十方諸佛同時證明讚言善哉是故一切菩薩聖衆皆共守護不久當得被無上道總願既說餘諸別願隨意應陳乃至以此善根回向自他平等利益兼不食不淨之物心無憂愁不起貪瞋癡等煩惱不樂世樂深修禪定如是行者是世大樂是衆生師三摩地現前速證無上正等菩提享保二十龍飛乙卯清明念八日竊點師傳刊行焉而無異本可以校者則以其未正冠書之以備後人之取捨冀為訂之日域豐山長谷輪下桑門無等識
